name: build-and-push
on:
  push:
    branches: [main]
    paths: ["projects/21-deploy-docker-k8s/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # SHAs imutáveis. Atualizar via Dependabot ou manualmente quando publicarem novas versões.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Login GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85  # v6.7.0
        with:
          context: projects/21-deploy-docker-k8s
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/oaken-agent:latest
            ghcr.io/${{ github.repository }}/oaken-agent:${{ github.sha }}
          provenance: true
          sbom: true
