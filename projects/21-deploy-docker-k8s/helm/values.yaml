image:
  repository: ghcr.io/isaac-carvalho/oaken-agent
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Configuração de rate limit + CORS (lidos como env via deployment.yaml)
rateLimit: 60
allowedOrigins: "http://localhost:3000"

# ⚠️  NÃO comitar valores reais no git. Injete via:
#   helm install agent ./helm --set secrets.openaiApiKey=$OPENAI_API_KEY
# ou via external-secrets / sealed-secrets em produção.
secrets:
  openaiApiKey: ""
  geminiApiKey: ""
  anthropicApiKey: ""
  oakenApiKey: ""    # API key do proprio /chat (auth do endpoint)
