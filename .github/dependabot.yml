version: 2
updates:
  # GitHub Actions: atualiza SHAs pinados automaticamente.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /projects/21-deploy-docker-k8s
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"

  # Pip: cobre os 21 projetos Python.
  - package-ecosystem: pip
    directory: /projects/21-deploy-docker-k8s
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    labels: ["dependencies"]
