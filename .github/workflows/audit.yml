name: security-audit
on:
  push:
    branches: [main]
    paths:
      - 'projects/**/requirements.txt'
      - 'constraints.txt'
      - '.github/workflows/audit.yml'
  pull_request:
  schedule:
    # Roda toda segunda 03:00 UTC pra pegar CVEs novos.
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      # Pin actions a SHAs imutáveis (vers "v4" pode mover; SHA não).
      # SHA = actions/checkout v4.2.2 (verificar e atualizar via Dependabot).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit deps de cada projeto
        run: |
          set +e
          STATUS=0
          for req in projects/*/requirements.txt; do
            echo "::group::$req"
            pip-audit -r "$req" --strict || STATUS=1
            echo "::endgroup::"
          done
          exit $STATUS
